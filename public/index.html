<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Haru</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Noto+Sans+JP:wght@200;300;400&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter','Noto Sans JP',sans-serif;
      background:#000;color:#e8e0d4;
      height:100dvh;overflow:hidden;
      display:flex;flex-direction:column;
      -webkit-user-select:none;user-select:none;
    }
    /* 水墨深空：多层晕染。color stops 由 JS 根据时间微调（CSS vars） */
    :root{
      --neb-1: rgba(30,45,100,0.55);
      --neb-2: rgba(60,25,110,0.42);
      --neb-3: rgba(25,60,120,0.32);
      --neb-4: rgba(80,40,130,0.22);
    }
    body::before{
      content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
      background:
        radial-gradient(ellipse 90% 70% at 50% 38%,var(--neb-1),transparent 60%),
        radial-gradient(ellipse 70% 55% at 78% 72%,var(--neb-2),transparent 60%),
        radial-gradient(ellipse 65% 55% at 18% 82%,var(--neb-3),transparent 60%),
        radial-gradient(ellipse 50% 40% at 30% 18%,var(--neb-4),transparent 60%),
        #000;
      transition: background 1.2s ease;
    }
    /* Vignette 聚焦中心 — z:1，盖在星空背景之上，在交互元素之下 */
    body::after{
      content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background:radial-gradient(ellipse 105% 90% at 50% 42%,transparent 50%,rgba(0,0,0,0.5) 100%);
    }

    /* ===== Full-screen starfield canvas ===== */
    canvas#c{position:fixed;inset:0;z-index:0;opacity:1;}

    /* ===== 水墨晕染 SVG 层：中央水墨星云的柔光笔触 ===== */
    .ink-mist{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      opacity:0.85;mix-blend-mode:screen;
      animation:mist-drift 22s ease-in-out infinite;
    }
    @keyframes mist-drift{
      0%,100%{transform:translate(0,0) scale(1);opacity:0.78;}
      50%{transform:translate(-12px,8px) scale(1.04);opacity:0.92;}
    }

    /* ===== Ambient glows (dreamy sci-fi palette) ===== */
    .glow{
      position:fixed;border-radius:50%;filter:blur(120px);opacity:0;
      transition:opacity 3s ease;pointer-events:none;z-index:0;
    }
    .glow.on{opacity:0.7;}
    .glow-1{
      width:460px;height:460px;
      background:radial-gradient(circle,rgba(120,90,255,0.22),transparent 70%);
      top:-120px;left:-120px;
      animation:glow-drift1 14s ease-in-out infinite;
    }
    .glow-2{
      width:360px;height:360px;
      background:radial-gradient(circle,rgba(80,180,255,0.18),transparent 70%);
      bottom:-80px;right:-80px;
      animation:glow-drift2 18s ease-in-out infinite;
    }
    .glow-center{
      width:420px;height:420px;
      background:radial-gradient(circle,rgba(140,120,255,0.12),transparent 60%);
      top:42%;left:50%;transform:translate(-50%,-50%);
      animation:glow-breathe 6s ease-in-out infinite;
    }
    @keyframes glow-breathe{
      0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.7;}
      50%{transform:translate(-50%,-50%) scale(1.15);opacity:0.95;}
    }
    @keyframes glow-drift1{
      0%,100%{transform:translate(0,0) scale(1);opacity:0.6;}
      50%{transform:translate(40px,30px) scale(1.08);opacity:0.85;}
    }
    @keyframes glow-drift2{
      0%,100%{transform:translate(0,0) scale(1);opacity:0.55;}
      50%{transform:translate(-35px,-25px) scale(1.1);opacity:0.8;}
    }

    /* ===== Layout ===== */
    .scene{
      position:relative;z-index:2;flex:1;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
      padding:0 24px 40px;overflow:hidden;
    }

    /* ===== Soul visualizer ===== */
    .soul{
      position:absolute;inset:0;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
      z-index:1;
    }
    .soul canvas{width:100%;height:100%;}

    /* ===== Soul label ===== */
    .soul-label{
      position:relative;z-index:3;
      margin-top:0;margin-bottom:8px;font-size:11px;font-weight:300;
      letter-spacing:8px;text-transform:uppercase;
      color:rgba(200,210,230,0.5);
      flex-shrink:0;text-align:center;
      transition:color 0.6s, letter-spacing 0.6s;
      animation:label-breathe 3.8s ease-in-out infinite;
    }
    @keyframes label-breathe{
      0%,100%{opacity:0.35;transform:scale(0.98);}
      50%{opacity:0.85;transform:scale(1.02);}
    }
    /* listening 态：更强的呼吸 + 字稍大 */
    .soul-label.listening{
      color:rgba(180,200,255,0.75);
      letter-spacing:10px;
      animation:label-breathe-listen 2.6s ease-in-out infinite;
      text-shadow:0 0 12px rgba(150,180,255,0.35);
    }
    @keyframes label-breathe-listen{
      0%,100%{opacity:0.45;transform:scale(0.98);text-shadow:0 0 6px rgba(150,180,255,0.2);}
      50%{opacity:1;transform:scale(1.04);text-shadow:0 0 20px rgba(150,180,255,0.55);}
    }

    /* ===== Dialogue area — 固定到视口，顶部渐变淡出 ===== */
    .dialogue{
      position:fixed;z-index:3;
      left:50%;transform:translateX(-50%);
      top:0;bottom:100px;
      width:calc(100% - 48px);max-width:560px;
      display:flex;flex-direction:column;justify-content:flex-end;
      gap:14px;padding:0 0 10px;
      pointer-events:auto;
      mask-image:linear-gradient(to bottom,
        transparent 0,
        transparent 30px,
        rgba(0,0,0,0.5) 70px,
        black 110px,
        black 100%);
      -webkit-mask-image:linear-gradient(to bottom,
        transparent 0,
        transparent 30px,
        rgba(0,0,0,0.5) 70px,
        black 110px,
        black 100%);
    }

    /* Messages - semi-transparent dark glassmorphic bubbles */
    .d-msg{padding:8px 0;animation:text-fade 0.9s ease-out;display:flex;flex-direction:column;}
    @keyframes text-fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ===== 消散飞行场 — 跨视口的 fixed 层，带顶部遮罩 ===== */
    /* 气泡消散时被克隆到这里，相对视口飞行并被顶部 mask 吞噬 */
    .fly-stage{
      position:fixed;inset:0;pointer-events:none;z-index:8;
      overflow:hidden; /* 硬性兜底：超出 stage 的部分直接被 clip */
      /* 顶部 25% 隐形遮罩：0-12vh 完全隐身，12-25vh 渐变到可见 */
      mask-image:linear-gradient(to bottom,
        transparent 0,
        transparent 12vh,
        rgba(0,0,0,0.2) 16vh,
        rgba(0,0,0,0.55) 20vh,
        rgba(0,0,0,0.85) 23vh,
        black 25vh,
        black 100%);
      -webkit-mask-image:linear-gradient(to bottom,
        transparent 0,
        transparent 12vh,
        rgba(0,0,0,0.2) 16vh,
        rgba(0,0,0,0.55) 20vh,
        rgba(0,0,0,0.85) 23vh,
        black 25vh,
        black 100%);
    }
    .fly-stage .d-msg{margin:0;padding:0;}
    /* clone 里的 backdrop-filter 去掉 —— 它和 mask 组合渲染不稳定 */
    .fly-stage .d-msg .d-text{
      backdrop-filter:none !important;
      -webkit-backdrop-filter:none !important;
    }

    /* ===== 消散动画：向上飞 + 自我裁切 + 融入星空 (加速版) ===== */
    .d-msg.dissolving .d-text{
      animation:haru-dissolve 1.4s cubic-bezier(.4,.0,.3,1) forwards;
      pointer-events:none;
    }
    .d-msg.dissolving .d-actions{opacity:0;transition:opacity 0.2s;}
    .d-you.dissolving .d-text{
      animation:user-fade 1.0s cubic-bezier(.4,.0,.3,1) forwards;
    }
    @keyframes haru-dissolve{
      0%   {transform:translateY(0) scale(1);opacity:1;filter:blur(0) brightness(1);}
      35%  {transform:translateY(-22vh) scale(0.92);opacity:0.55;filter:blur(4px) brightness(1.3);}
      70%  {transform:translateY(-50vh) scale(0.78);opacity:0.12;filter:blur(12px) brightness(1.5);}
      100% {transform:translateY(-72vh) scale(0.7);opacity:0;filter:blur(18px) brightness(1.6);}
    }
    @keyframes user-fade{
      0%   {transform:translateY(0) translateX(0) scale(1);opacity:1;filter:blur(0);}
      100% {transform:translateY(-14vh) translateX(18px) scale(0.88);opacity:0;filter:blur(8px);}
    }

    /* ===== 打字时的发光呼吸（让文字有"在被念出"的感觉） ===== */
    .d-msg.typing .d-text{
      text-shadow:
        0 0 8px rgba(200,180,255,0.25),
        0 0 16px rgba(140,100,220,0.15);
      animation:typing-glow 2s ease-in-out infinite;
    }
    @keyframes typing-glow{
      0%,100%{text-shadow:0 0 8px rgba(200,180,255,0.22),0 0 14px rgba(140,100,220,0.12);}
      50%{text-shadow:0 0 14px rgba(220,200,255,0.45),0 0 26px rgba(180,140,255,0.22);}
    }

    /* User bubble: 高透磨砂玻璃，右对齐，冷色调 */
    .d-you{align-items:flex-end;}
    .d-you .d-text{
      display:inline-block;max-width:82%;
      padding:14px 20px;border-radius:22px 22px 6px 22px;
      background:
        linear-gradient(135deg,rgba(180,210,255,0.06),transparent 45%),
        linear-gradient(135deg,rgba(20,30,60,0.42),rgba(15,20,45,0.32));
      border:1px solid rgba(150,190,255,0.18);
      backdrop-filter:blur(22px) saturate(140%);
      -webkit-backdrop-filter:blur(22px) saturate(140%);
      box-shadow:
        0 8px 32px rgba(20,40,120,0.28),
        inset 0 1px 0 rgba(200,220,255,0.12),
        inset 0 -1px 0 rgba(100,140,220,0.05);
      color:rgba(235,245,255,0.96);font-size:17px;font-weight:400;
      letter-spacing:0.3px;line-height:1.6;text-align:left;
    }

    /* Haru bubble: 更宽的玻璃面板，中心、紫罗兰调 */
    .d-haru{align-items:center;padding:16px 0;}
    .d-haru .d-text{
      display:inline-block;max-width:92%;
      /* 不再限高 —— 气泡沿 .dialogue 的 mask 向上淡入背景 */
      padding:20px 28px;border-radius:26px;
      background:
        linear-gradient(135deg,rgba(220,200,255,0.08),transparent 50%),
        linear-gradient(135deg,rgba(30,20,55,0.44),rgba(15,10,35,0.34));
      border:1px solid rgba(190,160,255,0.2);
      backdrop-filter:blur(26px) saturate(150%);
      -webkit-backdrop-filter:blur(26px) saturate(150%);
      box-shadow:
        0 10px 42px rgba(80,50,180,0.25),
        inset 0 1px 0 rgba(220,200,255,0.14),
        0 0 70px rgba(140,100,220,0.1);
      color:rgba(250,245,255,0.98);font-size:23px;font-weight:400;
      line-height:1.85;letter-spacing:0.4px;text-align:center;
    }
    /* 气泡内部隐藏滚动条 */
    .d-haru .d-text::-webkit-scrollbar{display:none;}
    .d-haru .d-text{scrollbar-width:none;}

    /* ===== 手机适配：字号缩小 + 性能降级 ===== */
    @media (max-width:600px){
      .d-you .d-text{
        font-size:15px;padding:11px 16px;line-height:1.55;
        /* 手机：降低 backdrop-filter 强度，省 GPU */
        backdrop-filter:blur(10px);
        -webkit-backdrop-filter:blur(10px);
      }
      .d-haru .d-text{
        font-size:18px;padding:16px 20px;line-height:1.65;
        backdrop-filter:blur(12px);
        -webkit-backdrop-filter:blur(12px);
      }
      .dialogue{max-width:100%;padding:20px 4px 8px;}

      /* 手机消散动画：极轻量，快速完成 —— 不和 VAD 抢主线程 */
      /* 完全去掉 filter:blur / brightness / mask，只保留 transform + opacity */
      .d-msg.dissolving .d-text{
        animation:haru-dissolve 0.65s cubic-bezier(.4,.0,.3,1) forwards;
      }
      .d-you.dissolving .d-text{
        animation:user-fade 0.5s cubic-bezier(.4,.0,.3,1) forwards;
      }
      @keyframes haru-dissolve{
        0%   {transform:translateY(0) scale(1);opacity:1;}
        50%  {transform:translateY(-22vh) scale(0.88);opacity:0.35;}
        100% {transform:translateY(-45vh) scale(0.76);opacity:0;}
      }
      @keyframes user-fade{
        0%   {transform:translateY(0) scale(1);opacity:1;}
        100% {transform:translateY(-10vh) scale(0.9);opacity:0;}
      }

      /* 手机 fly-stage：彻底去掉 mask + overflow:hidden 足矣 */
      /* mask-image 是 iOS Safari 上最贵的合成操作之一 */
      .fly-stage{
        mask-image:none;
        -webkit-mask-image:none;
      }
      /* Clone 的 backdrop-filter 强制关闭（即使桌面设了 12px 也关） */
      .fly-stage .d-msg .d-text{
        backdrop-filter:none !important;
        -webkit-backdrop-filter:none !important;
        box-shadow:none !important;
      }

      /* 手机 ink-mist：关闭漂移动画，静止显示 */
      .ink-mist{animation:none;}

      /* 手机 ambient glows：不要额外的漂移动画 */
      .glow-1,.glow-2{animation:none;}

      /* 手机 .glow-center 呼吸也关掉 —— 用 soul canvas 的呼吸就够了 */
      .glow-center{animation:none;}
    }

    /* Action buttons - nearly invisible */
    .d-actions{display:flex;gap:16px;margin-top:8px;justify-content:center;}
    .d-you .d-actions{justify-content:flex-end;}
    .d-act{
      background:none;border:none;padding:3px 0;
      color:rgba(255,176,136,0.25);font-size:10px;letter-spacing:2px;
      cursor:pointer;font-family:inherit;transition:color 0.4s;
    }
    .d-act:hover,.d-act.on{color:rgba(255,176,136,0.6);}

    /* Hidden detail / translation */
    .d-detail,.d-trans{display:none;margin-top:6px;animation:text-fade 0.5s ease-out;}
    .d-detail.open,.d-trans.open{display:block;}
    .d-correction{color:rgba(255,171,145,0.7);font-size:14px;font-weight:300;}
    .d-explanation{color:rgba(255,171,145,0.5);font-size:13px;font-weight:200;margin-top:2px;}
    .d-trans{color:rgba(255,255,255,0.45);font-size:15px;font-weight:200;font-style:italic;}

    /* Typing indicator */
    .d-typing{text-align:center;padding:18px 0;animation:text-fade 0.5s ease-out;}
    .wave{display:flex;gap:5px;justify-content:center;}
    .wave span{
      width:5px;height:5px;background:rgba(255,176,136,0.25);
      border-radius:50%;animation:w 1.4s infinite ease-in-out;
    }
    .wave span:nth-child(2){animation-delay:.15s}
    .wave span:nth-child(3){animation-delay:.3s}
    @keyframes w{0%,60%,100%{transform:translateY(0);opacity:.25}30%{transform:translateY(-8px);opacity:.6}}

    /* ===== Listening indicator (浮在底部的柔和呼吸圆点) ===== */
    /* 不再显示浏览器的不准确实时识别，只显示 "正在听" 的动效 */
    .live{
      position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:5;
      display:none;align-items:center;gap:6px;
      pointer-events:none;opacity:0.65;
    }
    .live.on{display:flex;}
    .live span{
      display:block;width:5px;height:5px;border-radius:50%;
      background:rgba(200,210,255,0.7);
      animation:live-pulse 1.4s ease-in-out infinite;
    }
    .live span:nth-child(2){animation-delay:0.18s;}
    .live span:nth-child(3){animation-delay:0.36s;}
    @keyframes live-pulse{
      0%,100%{transform:scale(0.85);opacity:0.3;}
      50%{transform:scale(1.25);opacity:0.95;box-shadow:0 0 12px rgba(180,200,255,0.6);}
    }

    /* ===== Bottom controls ===== */
    .controls{
      position:relative;z-index:3;
      padding:10px 20px max(20px,env(safe-area-inset-bottom));
      display:flex;align-items:center;gap:12px;
    }
    .mic{
      width:56px;height:56px;border-radius:50%;position:relative;
      background:linear-gradient(145deg,rgba(40,38,45,0.9),rgba(25,23,30,0.95));
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:0 2px 12px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.4s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0;
      overflow:visible;
    }
    /* 声波环 */
    .mic::before,.mic::after{
      content:'';position:absolute;border-radius:50%;
      border:1px solid rgba(200,180,160,0.08);
      transition:all 0.4s ease;
    }
    .mic::before{inset:-6px;animation:mic-breathe 4s infinite ease-in-out;}
    .mic::after{inset:-14px;animation:mic-breathe 4s infinite ease-in-out 1s;opacity:0.5;}
    @keyframes mic-breathe{
      0%,100%{transform:scale(1);opacity:0.5;border-color:rgba(200,180,160,0.06);}
      50%{transform:scale(1.04);opacity:1;border-color:rgba(200,180,160,0.12);}
    }
    .mic svg{
      color:rgba(200,185,170,0.4);transition:color 0.3s;
      filter:drop-shadow(0 0 3px rgba(200,180,160,0.1));
    }
    .mic:hover svg{color:rgba(200,185,170,0.6);}
    .mic:active{transform:scale(0.93);}

    /* Recording state */
    .mic.active{
      background:linear-gradient(145deg,rgba(50,35,35,0.95),rgba(30,20,20,0.95));
      border-color:rgba(255,120,100,0.15);
      box-shadow:0 0 25px rgba(255,100,80,0.08),inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .mic.active svg{color:rgba(255,140,120,0.7);}
    .mic.active::before{
      border-color:rgba(255,120,100,0.2);
      animation:mic-wave 1.5s infinite ease-out;
    }
    .mic.active::after{
      border-color:rgba(255,120,100,0.12);
      animation:mic-wave 1.5s infinite ease-out 0.4s;
    }
    @keyframes mic-wave{
      0%{transform:scale(1);opacity:0.8;}
      100%{transform:scale(1.5);opacity:0;}
    }
    .inp{
      flex:1;background:rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.04);border-radius:26px;
      padding:13px 18px;color:rgba(232,224,212,0.7);font-size:14px;
      font-weight:200;font-family:inherit;outline:none;transition:border-color 0.3s;
    }
    .inp::placeholder{color:rgba(255,255,255,0.08);}
    .inp:focus{border-color:rgba(255,112,67,0.15);}

    /* ===== Top buttons ===== */
    .top{
      position:fixed;top:12px;z-index:10;display:flex;gap:8px;
    }
    .top.left{left:16px;}
    .top.right{right:16px;}
    .tbtn{
      background:none;border:1px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.4);font-size:10px;padding:6px 14px;
      border-radius:16px;cursor:pointer;font-family:inherit;letter-spacing:1px;
      transition:all 0.3s;-webkit-tap-highlight-color:transparent;
    }
    .tbtn:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.2);}

    /* ===== History overlay ===== */
    .overlay{
      display:none;position:fixed;inset:0;z-index:50;
      background:rgba(5,5,8,0.97);backdrop-filter:blur(30px);
      flex-direction:column;padding:20px;
    }
    .overlay.open{display:flex;}
    .overlay-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .overlay-title{font-size:18px;font-weight:300;letter-spacing:4px;color:rgba(255,176,136,0.8);}
    .overlay-close{
      background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);
      padding:7px 16px;border-radius:16px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:1px;
    }
    .overlay-body{flex:1;overflow-y:auto;}
    .h-msg{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.02);}
    .h-role{font-size:9px;color:rgba(255,176,136,0.5);letter-spacing:3px;text-transform:uppercase;}
    .h-text{font-size:15px;font-weight:300;color:rgba(255,255,255,0.7);margin-top:3px;line-height:1.6;}

    /* ===== BGM button ===== */
    .bgm-indicator{
      width:6px;height:6px;border-radius:50%;
      background:rgba(255,176,136,0.5);display:inline-block;
      margin-right:4px;vertical-align:middle;
    }
    .bgm-indicator.playing{animation:bgm-pulse 2s infinite;}
    @keyframes bgm-pulse{0%,100%{opacity:.3}50%{opacity:.8}}

    /* Scrollbar */
    ::-webkit-scrollbar{width:0px;}

    /* Error */
    .toast{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);
      background:rgba(180,40,40,0.12);border:1px solid rgba(180,40,40,0.2);
      color:rgba(239,154,154,0.7);padding:8px 20px;border-radius:20px;

    /* ===== Stats bar ===== */

    /* timer display */

  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- 水墨晕染层：三层柔光笔触，模拟水墨星云晕染 -->
<svg class="ink-mist" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>

      <stop offset="22%" stop-color="rgba(120,100,220,0.28)"/>
      <stop offset="50%" stop-color="rgba(60,80,180,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="inkWarm" cx="50%" cy="42%" r="15%">

    </radialGradient>
    <radialGradient id="inkCyan" cx="30%" cy="35%" r="30%">

  <g filter="url(#inkBlur)" opacity="0.4">

<div class="glow glow-1 on"></div>

<!-- Top -->
<div class="top left">

  <button class="tbtn" id="bgmBtn" onclick="toggleBGM()"><span class="bgm-indicator" id="bgmDot"></span>bgm</button>

<!-- End session dialog -->

  <div class="dialog-box">

<div class="scene">

    <canvas id="soulCanvas" width="400" height="400"></canvas>

<div class="live" id="live"><span></span><span></span><span></span></div>


<script>
// ============================================================
// 预热 Railway ——  避免用户第一句话遇到冷启动 3-5 秒
// 页面一加载就 ping 一下，并每 4 分钟 ping 一次保持不休眠
// ============================================================
(function warmupRailway() {
  const ping = () => {
    const t = Date.now();
    fetch('/api/ping').then(r => r.json()).then(d => {
      console.log(`🏓 /api/ping ${Date.now() - t}ms`, d);
    }).catch(() => {});
  };
  ping();
  setInterval(ping, 4 * 60 * 1000); // 每 4 分钟保活
})();

// ============================================================
// 时间感知色温 —— 根据设备当前时间微调星云色调
// 深夜偏冷偏深，黄昏偏暖偏紫，白天稍偏蓝
// ============================================================
(function applyTimeOfDayPalette() {
  const apply = () => {
    const h = new Date().getHours();
    let palette;
    if (h >= 22 || h < 5) {
      // 深夜 (22:00-05:00): 最冷最深，偏蓝黑 + 深紫
      palette = ['rgba(18,25,70,0.55)', 'rgba(40,15,85,0.40)',
                 'rgba(15,40,90,0.30)', 'rgba(55,25,110,0.20)'];
    } else if (h >= 5 && h < 9) {
      // 黎明 (05:00-09:00): 微暖，深蓝转青紫
      palette = ['rgba(40,55,110,0.50)', 'rgba(90,50,130,0.38)',
                 'rgba(30,80,130,0.30)', 'rgba(120,70,150,0.22)'];
    } else if (h >= 9 && h < 17) {
      // 白天 (09:00-17:00): 偏蓝紫，保持梦幻感
      palette = ['rgba(35,55,115,0.50)', 'rgba(70,35,125,0.40)',
                 'rgba(30,70,130,0.30)', 'rgba(95,55,140,0.22)'];
    } else if (h >= 17 && h < 20) {
      // 黄昏 (17:00-20:00): 最暖，深紫罗兰 + 余晖感
      palette = ['rgba(50,30,100,0.55)', 'rgba(110,35,100,0.45)',
                 'rgba(35,35,100,0.32)', 'rgba(130,60,130,0.26)'];
    } else {
      // 夜晚 (20:00-22:00): 标准紫蓝
      palette = ['rgba(30,45,100,0.55)', 'rgba(60,25,110,0.42)',
                 'rgba(25,60,120,0.32)', 'rgba(80,40,130,0.22)'];
    }
    const r = document.documentElement;
    r.style.setProperty('--neb-1', palette[0]);
    r.style.setProperty('--neb-2', palette[1]);
    r.style.setProperty('--neb-3', palette[2]);
    r.style.setProperty('--neb-4', palette[3]);
  };
  apply();
  setInterval(apply, 5 * 60 * 1000); // 每 5 分钟检查一次
})();

// ============================================================
// STATE
// ============================================================
let messages = JSON.parse(localStorage.getItem('haruMsg2') || '[]');
let isRecording = false, isBusy = false;
let recognition, micStream = null;
let mediaRecorder = null, audioChunks = [];
let finalTranscript = '', lastTranscript = '';
let aiState = 'idle';
let micReady = false;
let sessionEnded = false;

const soul = document.getElementById('soul');
const label = document.getElementById('label');
const dlg = document.getElementById('dialogue');
const live = document.getElementById('live');

const ap = new Audio();
let audioUnlocked = false;

// ============================================================
// PARTICLE SYSTEM
// ============================================================
// 手机检测：小屏幕 OR 设备像素比高 OR ua 明确标注
const IS_MOBILE = Math.min(innerWidth, innerHeight) < 700
                  || /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
console.log('📱 IS_MOBILE =', IS_MOBILE);

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const pts = [];
const N = IS_MOBILE ? 90 : 200;  // 手机粒子减半以上
let cx, cy;

function resizeCanvas() {
  canvas.width = innerWidth; canvas.height = innerHeight;
  cx = canvas.width / 2; cy = canvas.height * 0.35;
}
addEventListener('resize', resizeCanvas);
resizeCanvas();

class Pt {
  constructor() { this.spawn(); }
  spawn() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.sz = Math.random() * 1.3 + 0.18;  // 更细碎
    this.baseSz = this.sz;
    this.vx = (Math.random() - 0.5) * 0.1;  // 更慢的漂移
    this.vy = (Math.random() - 0.5) * 0.1;
    this.a = Math.random() * 0.55 + 0.12;
    this.ba = this.a;
    this.ph = Math.random() * Math.PI * 2;
    // Star color: 白 / 淡金 / 冷蓝 — 水墨星尘的色调
    const roll = Math.random();
    if (roll < 0.55)      this.col = '255,255,255';   // 纯白星尘
    else if (roll < 0.78) this.col = '255,240,200';   // 淡金
    else if (roll < 0.92) this.col = '180,200,255';   // 冷蓝白
    else                  this.col = '255,200,140';   // 少量暖金
    // Twinkle speed — 有些很慢，像静止的，有些闪烁
    this.twSpeed = 0.002 + Math.random() * 0.006;
  }
  update(t) {
    this.ph += this.twSpeed;
    // Twinkle baseline (all states)
    const twinkle = Math.sin(this.ph) * 0.35;
    if (aiState === 'speaking') {
      // 只保留星空的轻微呼吸，不要向中心汇聚
      this.x += this.vx * 0.3;
      this.y += this.vy * 0.3;
      const breath = Math.sin(t * 0.0012 + this.ph * 0.3) * 0.12;
      this.a = this.ba + twinkle + breath;
      this.sz = this.baseSz + breath * 0.3;
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    } else if (aiState === 'listening') {
      // listening 用和 idle 同样的漂移 + 闪烁节奏，只是整体变暗
      this.x += this.vx + Math.sin(this.ph) * 0.04;
      this.y += this.vy + Math.cos(this.ph) * 0.04;
      this.a = this.ba * 0.6 + twinkle * 0.7;
      this.sz = this.baseSz * 0.9 + Math.sin(this.ph * 1.5) * 0.15;
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    } else if (aiState === 'thinking') {
      const dx = this.x - cx, dy = this.y - cy;
      const ang = 0.0004;
      this.x = cx + dx * Math.cos(ang) - dy * Math.sin(ang);
      this.y = cy + dx * Math.sin(ang) + dy * Math.cos(ang);
      this.a = this.ba + twinkle * 0.7;
      this.sz = this.baseSz;
    } else {
      this.x += this.vx + Math.sin(this.ph) * 0.04;
      this.y += this.vy + Math.cos(this.ph) * 0.04;
      this.a = this.ba + twinkle;
      this.sz = this.baseSz + Math.sin(this.ph * 1.5) * 0.2;
      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    }
  }
  draw() {
    const alpha = Math.max(0, Math.min(1, this.a));
    const s = Math.max(0.15, this.sz);
    // Glow halo for brighter stars
    if (s > 0.9) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, s * 2.2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.col},${alpha * 0.15})`;
      ctx.fill();
    }
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.col},${alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < N; i++) pts.push(new Pt());

// ========== 宇宙尘埃 —— 缓慢向下飘落的细微白点 ==========
// 给画面加深度层次，像"星空里飘着细雪"
const dustCount = IS_MOBILE ? 12 : 22;
const dust = [];
class Dust {
  constructor() { this.spawn(true); }
  spawn(initial) {
    this.x = Math.random() * canvas.width;
    // 初始化时散布全屏，重生时从顶部出现
    this.y = initial ? Math.random() * canvas.height : -5;
    this.vy = 0.08 + Math.random() * 0.15;   // 很慢的下落（0.08-0.23 px/frame）
    this.vx = (Math.random() - 0.5) * 0.04; // 极小的水平漂移
    this.sz = 0.4 + Math.random() * 1.1;
    this.a = 0.15 + Math.random() * 0.25;
    this.ph = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.ph += 0.02;
    if (this.y > canvas.height + 10) this.spawn(false);
  }
  draw() {
    const flicker = 0.8 + Math.sin(this.ph) * 0.2;
    ctx.fillStyle = `rgba(230,235,255,${this.a * flicker})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
    ctx.fill();
  }
}
for (let i = 0; i < dustCount; i++) dust.push(new Dust());

// ========== "存在感"心跳 —— 从中心扩散的淡圆环 ==========
// 每 ~7 秒一次，从中心向外推一层极淡的环，像"Haru 还在看着你"
let nextPresencePulse = 3000;
const presencePulses = [];
class PresencePulse {
  constructor() {
    this.cx = canvas.width * 0.5;
    this.cy = canvas.height * 0.36;  // 接近 soul 中心
    this.r = 10;
    this.maxR = Math.min(canvas.width, canvas.height) * 0.55;
    this.life = 1;
    this.decay = 0.008;
  }
  update() {
    this.r += (this.maxR - this.r) * 0.018;  // 非线性扩散：开始快，后面慢
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    const a = this.life * 0.18;
    ctx.strokeStyle = `rgba(180,170,255,${a})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  get dead() { return this.life <= 0; }
}

// ========== 消散粒子系统（气泡 → 星空） ==========
const dissolveParticles = [];

class DissolveParticle {
  constructor(x, y, style) {
    this.x = x;
    this.y = y;
    // 向上 + 轻微扩散（加速版：初速度和加速度都更大）
    const spread = (Math.random() - 0.5) * 3.5;
    this.vx = spread;
    this.vy = -2.8 - Math.random() * 3.5;  // -2.8 to -6.3 (之前 -1.2 to -3.7)
    this.ax = 0;
    this.ay = -0.04;  // 之前 -0.018，更强的向上吸引
    this.life = 1;
    this.decay = 0.018 + Math.random() * 0.012;  // 之前 0.006+0.006，生命 ~0.6-1s
    this.size = 0.6 + Math.random() * 1.6;
    this.phase = Math.random() * Math.PI * 2;
    // 颜色：cosmic = 紫蓝白金混合；faint = 偏冷偏淡
    if (style === 'cosmic') {
      const roll = Math.random();
      this.col = roll < 0.4 ? '220,230,255'
               : roll < 0.65 ? '180,150,255'
               : roll < 0.85 ? '255,220,170'
               : '140,180,255';
    } else {
      // user bubble: 冷色淡粒子
      this.col = Math.random() < 0.5 ? '180,210,255' : '220,230,255';
    }
  }
  update() {
    this.vx += this.ax;
    this.vy += this.ay;
    this.x += this.vx + Math.sin(this.phase) * 0.3;
    this.y += this.vy;
    this.phase += 0.08;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    const a = Math.max(0, this.life);
    const s = this.size * (0.5 + a * 0.8);
    // 手机：只画 core（省一半的 arc + fill 调用 → 消散瞬间主线程更空，VAD 不受影响）
    // 桌面：保留 halo + core
    if (!IS_MOBILE) {
      ctx.fillStyle = `rgba(${this.col},${a * 0.2})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, s * 2.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = `rgba(${this.col},${a * 0.95})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fill();
  }
  get dead() {
    return this.life <= 0 || this.y < -60;
  }
}

function spawnDissolveParticles(el, style) {
  const rect = el.getBoundingClientRect();
  const area = rect.width * rect.height;
  // 手机更节省：~15-30 颗（之前 30-60），桌面保留原量（50-180 颗）
  const maxCount = IS_MOBILE ? 30 : 180;
  const minCount = IS_MOBILE ? 15 : 50;
  const divisor = IS_MOBILE ? 600 : 280;
  const count = Math.min(maxCount, Math.max(minCount, Math.floor(area / divisor)));
  for (let i = 0; i < count; i++) {
    const x = rect.left + Math.random() * rect.width;
    const y = rect.top + Math.random() * rect.height;
    dissolveParticles.push(new DissolveParticle(x, y, style));
  }
}

// ========== 星星亮闪系统（带十字光芒的 nova 特写）==========
const starFlashes = [];
let nextStarFlash = 5000; // 第一颗 5 秒后出现

class StarFlash {
  constructor() {
    // 随机位置，避开屏幕正下方（避开 mic / input 栏）
    this.x = canvas.width * 0.08 + Math.random() * canvas.width * 0.84;
    this.y = canvas.height * 0.05 + Math.random() * canvas.height * 0.65;
    this.maxHalo = (IS_MOBILE ? 6 : 10) + Math.random() * (IS_MOBILE ? 6 : 10);
    this.life = 1;
    this.decay = 0.011 + Math.random() * 0.005; // 约 1.3-1.7s 生命周期
    // 色彩：大多白色，偶尔暖金，偶尔冷青
    const roll = Math.random();
    this.col = roll < 0.55 ? '255,255,255'
             : roll < 0.82 ? '255,235,190'
             : roll < 0.94 ? '200,220,255'
             : '255,200,150';
  }
  update() {
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    // 强度曲线：0→1→0 经过 sin 曲线，在中段达到峰值
    const progress = 1 - this.life;
    const intensity = Math.sin(progress * Math.PI);
    if (intensity <= 0) return;
    const halo = this.maxHalo * (0.3 + intensity * 0.7);
    const core = 0.8 + intensity * 1.8;

    // 外层大光晕
    ctx.fillStyle = `rgba(${this.col},${intensity * 0.08})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, halo * 2.2, 0, Math.PI * 2);
    ctx.fill();
    // 中层
    ctx.fillStyle = `rgba(${this.col},${intensity * 0.28})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, halo, 0, Math.PI * 2);
    ctx.fill();
    // 核心亮点
    ctx.fillStyle = `rgba(${this.col},${intensity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, core, 0, Math.PI * 2);
    ctx.fill();

    // 十字光芒 —— 强度超过一半才显示，让闪烁感更突出
    if (intensity > 0.4) {
      const flareLen = halo * 3.2 * (intensity - 0.4) / 0.6;
      const flareAlpha = (intensity - 0.4) * 1.2;
      const grad = ctx.createLinearGradient(
        this.x - flareLen, this.y, this.x + flareLen, this.y
      );
      grad.addColorStop(0, `rgba(${this.col},0)`);
      grad.addColorStop(0.5, `rgba(${this.col},${flareAlpha})`);
      grad.addColorStop(1, `rgba(${this.col},0)`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.3;
      ctx.lineCap = 'round';
      // 水平光芒
      ctx.beginPath();
      ctx.moveTo(this.x - flareLen, this.y);
      ctx.lineTo(this.x + flareLen, this.y);
      ctx.stroke();
      // 垂直光芒
      const vgrad = ctx.createLinearGradient(
        this.x, this.y - flareLen, this.x, this.y + flareLen
      );
      vgrad.addColorStop(0, `rgba(${this.col},0)`);
      vgrad.addColorStop(0.5, `rgba(${this.col},${flareAlpha})`);
      vgrad.addColorStop(1, `rgba(${this.col},0)`);
      ctx.strokeStyle = vgrad;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - flareLen);
      ctx.lineTo(this.x, this.y + flareLen);
      ctx.stroke();
    }
  }
  get dead() { return this.life <= 0; }
}

// ========== 流星系统 ==========
const shootingStars = [];
let nextShootingStar = 4000; // 第一颗 4 秒后出现

class ShootingStar {
  constructor() {
    // 移动端尺寸较小 → 线稍粗一些，让 DPR>1 的屏幕也看得见
    const isMobile = Math.min(canvas.width, canvas.height) < 700;
    // 从屏幕上方某个位置向下方划过
    const fromLeft = Math.random() < 0.5;
    this.x = fromLeft
      ? Math.random() * canvas.width * 0.35
      : canvas.width * 0.65 + Math.random() * canvas.width * 0.35;
    this.y = Math.random() * canvas.height * 0.45;
    // 角度
    const angle = fromLeft
      ? (Math.PI * 0.16) + Math.random() * (Math.PI * 0.15)
      : (Math.PI * 0.69) + Math.random() * (Math.PI * 0.15);
    // 手机上速度按屏幕缩放：小屏慢一点就不会一闪而过
    const speedBase = isMobile ? 4.5 : 6;
    const speed = speedBase + Math.random() * 4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1;
    this.decay = 0.009 + Math.random() * 0.006; // 活得更久一点
    this.len = (isMobile ? 100 : 120) + Math.random() * 80;
    this.width = isMobile ? 2.6 : 2.0;       // 手机上更粗
    this.headR = isMobile ? 3.2 : 2.6;       // 头部更大
    // 颜色：白、淡金、淡青
    const roll = Math.random();
    this.col = roll < 0.55 ? '255,255,255' : (roll < 0.82 ? '255,240,200' : '180,220,255');
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    // 拖尾
    const tailX = this.x - this.vx * (this.len / 8);
    const tailY = this.y - this.vy * (this.len / 8);
    const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
    grad.addColorStop(0, `rgba(${this.col},${this.life * 0.95})`);
    grad.addColorStop(0.3, `rgba(${this.col},${this.life * 0.6})`);
    grad.addColorStop(1, `rgba(${this.col},0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = this.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(tailX, tailY);
    ctx.stroke();
    // 头部光晕（外圈柔光）
    ctx.fillStyle = `rgba(${this.col},${this.life * 0.25})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.headR * 2.2, 0, Math.PI * 2);
    ctx.fill();
    // 头部亮点
    ctx.fillStyle = `rgba(${this.col},${this.life})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.headR, 0, Math.PI * 2);
    ctx.fill();
  }
  get dead() { return this.life <= 0 || this.x < -200 || this.x > canvas.width + 200 || this.y > canvas.height + 200; }
}

// 手机 listening 时降到 ~15fps —— 把主线程让给 VAD
let _lastDrawPts = 0;
function drawPts(t) {
  if (IS_MOBILE && aiState === 'listening') {
    if (t - _lastDrawPts < 66) {  // 66ms ≈ 15fps
      requestAnimationFrame(drawPts);
      return;
    }
    _lastDrawPts = t;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < N; i++) {
    pts[i].update(t); pts[i].draw();
  }

  // 流星：平均 14-24 秒一颗（稀疏一些，更珍贵）
  if (t >= nextShootingStar) {
    shootingStars.push(new ShootingStar());
    nextShootingStar = t + 14000 + Math.random() * 10000;
  }
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    shootingStars[i].update();
    shootingStars[i].draw();
    if (shootingStars[i].dead) shootingStars.splice(i, 1);
  }

  // 星星亮闪：平均 7-15 秒一颗
  if (t >= nextStarFlash) {
    starFlashes.push(new StarFlash());
    nextStarFlash = t + 7000 + Math.random() * 8000;
  }
  for (let i = starFlashes.length - 1; i >= 0; i--) {
    starFlashes[i].update();
    starFlashes[i].draw();
    if (starFlashes[i].dead) starFlashes.splice(i, 1);
  }

  // 宇宙尘埃（总是飘着）
  for (let i = 0; i < dust.length; i++) {
    dust[i].update();
    dust[i].draw();
  }

  // 存在感心跳：平均 6-10 秒一次
  if (t >= nextPresencePulse) {
    presencePulses.push(new PresencePulse());
    nextPresencePulse = t + 6000 + Math.random() * 4000;
  }
  for (let i = presencePulses.length - 1; i >= 0; i--) {
    presencePulses[i].update();
    presencePulses[i].draw();
    if (presencePulses[i].dead) presencePulses.splice(i, 1);
  }

  // 消散粒子（Haru 气泡飞向星空）
  for (let i = dissolveParticles.length - 1; i >= 0; i--) {
    dissolveParticles[i].update();
    dissolveParticles[i].draw();
    if (dissolveParticles[i].dead) dissolveParticles.splice(i, 1);
  }

  // Constellation lines only when AI is speaking (subtle network effect)
  if (aiState === 'speaking' || aiState === 'thinking') {
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        const d2 = dx * dx + dy * dy;
        if (d2 < 12000) {
          const a = (1 - d2 / 12000) * (aiState === 'speaking' ? 0.08 : 0.04);
          ctx.strokeStyle = `rgba(160,200,255,${a})`;
          ctx.lineWidth = 0.35;
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.stroke();
        }
      }
    }
  }
  requestAnimationFrame(drawPts);
}
requestAnimationFrame(drawPts);
