// SOUL VISUALIZER — 银河粒子系统
// ============================================================
const soulCanvas = document.getElementById('soulCanvas');
const sCtx = soulCanvas.getContext('2d');
let SW, SH;

function resizeSoul() {
  const r = window.devicePixelRatio || 1;
  SW = soul.clientWidth; SH = soul.clientHeight;
  soulCanvas.width = SW * r; soulCanvas.height = SH * r;
  sCtx.scale(r, r);
}
resizeSoul();
addEventListener('resize', resizeSoul);

const GALAXY_COUNT = IS_MOBILE ? 220 : 550;  // 手机大幅减量
const galaxy = [];

// 粒子颜色组 — 水墨银河色调：冷蓝紫主体 + 暖金核心点缀
const COLORS = [
  { r:255, g:255, b:255 }, // 纯白
  { r:200, g:220, b:255 }, // 浅蓝白
  { r:140, g:170, b:255 }, // 冷蓝
  { r:100, g:130, b:230 }, // 深蓝
  { r:180, g:150, b:230 }, // 淡紫
  { r:140, g:110, b:200 }, // 深紫
  { r:120, g:200, b:220 }, // 青
  { r:255, g:230, b:180 }, // 淡金
  { r:255, g:200, b:130 }, // 暖金
];

class GalaxyPt {
  constructor() {
    this.spawn();
  }
  spawn() {
    // 椭圆星云分布 — 让外围更散、中心更浓（水墨晕染效果）
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.pow(Math.random(), 0.75) * 0.46; // 中心更浓
    this.baseX = 0.5 + Math.cos(angle) * dist * 1.35;
    this.baseY = 0.42 + Math.sin(angle) * dist * 0.72;
    this.x = this.baseX;
    this.y = this.baseY;
    this.size = Math.random() * 2 + 0.25;
    this.baseSize = this.size;
    // 色彩分层：核心暖金 → 内层紫 → 中层蓝紫 → 外围冷蓝白
    if (dist < 0.1) {
      // 核心：暖金 + 少量纯白
      this.col = COLORS[Math.random() < 0.55 ? 7 : (Math.random() < 0.6 ? 0 : 8)];
    } else if (dist < 0.18) {
      // 内层：淡紫 + 暖金点缀
      this.col = COLORS[Math.random() < 0.4 ? 4 : (Math.random() < 0.3 ? 7 : 1)];
    } else if (dist < 0.28) {
      // 中层：蓝紫 + 青
      this.col = COLORS[Math.random() < 0.4 ? 2 : (Math.random() < 0.5 ? 5 : 6)];
    } else {
      // 外围：冷蓝 + 白
      this.col = COLORS[Math.random() < 0.35 ? 3 : (Math.random() < 0.5 ? 2 : 1)];
    }
    this.alpha = Math.random() * 0.55 + 0.1;
    this.baseAlpha = this.alpha;
    this.phase = Math.random() * Math.PI * 2;
    this.speed = 0.0008 + Math.random() * 0.0022; // 更慢
    this.driftX = (Math.random() - 0.5) * 0.0018;
    this.driftY = (Math.random() - 0.5) * 0.0009;
    this.orbitSpeed = (Math.random() - 0.5) * 0.00025;
    this.orbitAngle = angle;
    this.orbitR = dist;
  }
  update(t) {
    this.phase += this.speed;

    if (aiState === 'listening') {
      // listening 用和 idle 完全相同的运动节奏（旋转 + 呼吸 + 摆动），
      // 只是整体 alpha 和 size 降一级 —— 切换时没有速度变化，只有亮度渐变
      this.orbitAngle += 0.00025 + this.orbitR * 0.0001; // 同 idle
      const breath = (Math.sin(t * 0.001) + 1) / 2;      // 同 idle 呼吸
      const breathR = 1 + breath * 0.08;
      const wobbleX = Math.sin(this.phase) * 0.015;
      const wobbleY = Math.cos(this.phase * 0.8) * 0.012;
      this.x = 0.5 + Math.cos(this.orbitAngle) * this.orbitR * 1.35 * breathR + wobbleX;
      this.y = 0.42 + Math.sin(this.orbitAngle) * this.orbitR * 0.72 * breathR + wobbleY;
      // listening 的差异：alpha 少 30%、size 少 15%，让它"退后一层"但不突兀
      this.alpha = this.baseAlpha * (0.5 + breath * 0.2);
      this.size = this.baseSize * (0.82 + breath * 0.1);
    } else if (aiState === 'speaking') {
      // 缓慢呼吸 + 柔和波动，~5秒一个周期
      this.orbitAngle += 0.0015;
      const breath = Math.sin(t * 0.0012) * 0.035; // slow ~5s breath
      const ripple = Math.sin(this.orbitAngle * 3 + t * 0.0015) * 0.008; // gentle wave
      this.x = 0.5 + Math.cos(this.orbitAngle) * (this.orbitR * 1.3 + breath + ripple);
      this.y = 0.42 + Math.sin(this.orbitAngle) * (this.orbitR * 0.7 + breath * 0.6);
      this.alpha = this.baseAlpha + Math.sin(t * 0.0012 + this.phase * 0.3) * 0.12;
      this.size = this.baseSize + Math.sin(t * 0.0012 + this.phase * 0.3) * 0.25;
    } else if (aiState === 'thinking') {
      // 缓慢聚拢旋转
      this.orbitAngle += 0.004;
      const shrink = 0.7;
      this.x = 0.5 + Math.cos(this.orbitAngle) * this.orbitR * 1.3 * shrink;
      this.y = 0.42 + Math.sin(this.orbitAngle) * this.orbitR * 0.7 * shrink;
      this.alpha = this.baseAlpha * 0.8 + Math.sin(t * 0.003) * 0.1;
      this.size = this.baseSize * 0.9;
    } else {
      // idle: 整个星系极慢旋转 + 呼吸 + 每颗粒子自身微摆 + 大呼吸
      // 1) 全星系慢速逆时针旋转 (~120s 一圈)
      this.orbitAngle += 0.00025 + this.orbitR * 0.0001;
      // 2) 大呼吸脉动 (~6s 周期)
      const breath = (Math.sin(t * 0.001) + 1) / 2; // 0..1
      const breathR = 1 + breath * 0.08;
      // 3) 每颗粒子的自由摆动
      const wobbleX = Math.sin(this.phase) * 0.015;
      const wobbleY = Math.cos(this.phase * 0.8) * 0.012;
      // 最终位置：基于 orbitAngle 和 orbitR 重新计算，配上呼吸和摆动
      this.x = 0.5 + Math.cos(this.orbitAngle) * this.orbitR * 1.35 * breathR + wobbleX;
      this.y = 0.42 + Math.sin(this.orbitAngle) * this.orbitR * 0.72 * breathR + wobbleY;
      // alpha 跟着呼吸 + 自身 twinkle
      this.alpha = this.baseAlpha * (0.75 + breath * 0.35) + Math.sin(this.phase * 2) * 0.1;
      this.size = this.baseSize * (0.9 + breath * 0.15) + Math.sin(this.phase * 2) * 0.3;
    }
  }
  draw() {
    const px = this.x * SW;
    const py = this.y * SH;
    const a = Math.max(0, Math.min(1, this.alpha));
    const s = Math.max(0.2, this.size);
    const { r, g, b } = this.col;

    // 发光
    if (s > 1) {
      sCtx.beginPath();
      sCtx.arc(px, py, s * 2.5, 0, Math.PI * 2);
      sCtx.fillStyle = `rgba(${r},${g},${b},${a * 0.06})`;
      sCtx.fill();
    }

    // 核心
    sCtx.beginPath();
    sCtx.arc(px, py, s, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(${r},${g},${b},${a})`;
    sCtx.fill();
  }
}

for (let i = 0; i < GALAXY_COUNT; i++) galaxy.push(new GalaxyPt());

// 手机 listening 时也降到 ~15fps
let _lastDrawSoul = 0;
function drawSoul(t) {
  if (IS_MOBILE && aiState === 'listening') {
    if (t - _lastDrawSoul < 66) {
      requestAnimationFrame(drawSoul);
      return;
    }
    _lastDrawSoul = t;
  }
  sCtx.clearRect(0, 0, SW, SH);

  // 中心星云光晕 — 水墨多层晕染 + 呼吸脉动
  let intensity, breathScale = 1;
  if (aiState === 'speaking') {
    intensity = 1 + Math.sin(t * 0.0012) * 0.35; // ~5s 呼吸
    breathScale = 1 + Math.sin(t * 0.0012) * 0.05;
  } else {
    // listening 和 idle 共用同一个时基和呼吸率 —— 只是 listening 暗一些
    // 切换时观众看到的是 intensity 从 idle 的 [0.45..1.0] 平滑变到 listening 的 [0.35..0.8]
    // breathScale 保持不变，没有跳变感
    const b = (Math.sin(t * 0.001) + 1) / 2; // 同时基，6s 呼吸
    breathScale = 0.92 + b * 0.12;
    if (aiState === 'listening') {
      intensity = 0.35 + b * 0.45;           // 稍暗版
    } else {
      intensity = 0.45 + b * 0.55;
    }
  }

  // Layer 1 — 大片紫蓝水墨（外层晕染）
  const g1 = sCtx.createRadialGradient(SW * 0.5, SH * 0.42, 0, SW * 0.5, SH * 0.42, SW * 0.45 * breathScale);
  g1.addColorStop(0, `rgba(90,110,220,${0.07 * intensity})`);
  g1.addColorStop(0.35, `rgba(120,90,200,${0.05 * intensity})`);
  g1.addColorStop(0.7, `rgba(50,40,120,${0.02 * intensity})`);
  g1.addColorStop(1, 'transparent');
  sCtx.fillStyle = g1;
  sCtx.fillRect(0, 0, SW, SH);

  // Layer 2 — 青色侧晕（偏上左）
  const g2 = sCtx.createRadialGradient(SW * 0.42, SH * 0.36, 0, SW * 0.42, SH * 0.36, SW * 0.32 * breathScale);
  g2.addColorStop(0, `rgba(100,200,230,${0.06 * intensity})`);
  g2.addColorStop(1, 'transparent');
  sCtx.fillStyle = g2;
  sCtx.fillRect(0, 0, SW, SH);

  // Layer 3 — 紫色侧晕（偏下右）
  const g3 = sCtx.createRadialGradient(SW * 0.58, SH * 0.48, 0, SW * 0.58, SH * 0.48, SW * 0.3 * breathScale);
  g3.addColorStop(0, `rgba(180,110,220,${0.055 * intensity})`);
  g3.addColorStop(1, 'transparent');
  sCtx.fillStyle = g3;
  sCtx.fillRect(0, 0, SW, SH);

  // Layer 4 — 核心暖金（银河中心）
  const g4 = sCtx.createRadialGradient(SW * 0.5, SH * 0.42, 0, SW * 0.5, SH * 0.42, SW * 0.12 * breathScale);
  g4.addColorStop(0, `rgba(255,220,160,${0.1 * intensity})`);
  g4.addColorStop(0.6, `rgba(255,180,120,${0.04 * intensity})`);
  g4.addColorStop(1, 'transparent');
  sCtx.fillStyle = g4;
  sCtx.fillRect(0, 0, SW, SH);

  galaxy.forEach(p => { p.update(t); p.draw(); });
  requestAnimationFrame(drawSoul);
}
requestAnimationFrame(drawSoul);

// ============================================================
// BGM - Ambient Audio
// ============================================================
let bgmAudio = null, bgmPlaying = false, bgmInited = false;

function initBGM() {
  if (bgmInited) return;
  bgmInited = true;
  bgmAudio = new Audio('/bgm.mp3');
  bgmAudio.loop = true;
  bgmAudio.volume = 0;
  bgmAudio.preload = 'auto';
}

function startBGM() {
  initBGM();
  if (bgmPlaying) return;
  bgmAudio.play().catch(() => {});
  let v = 0;
  const fadeIn = setInterval(() => {
    v = Math.min(v + 0.001, 0.03);
    bgmAudio.volume = v;
    if (v >= 0.03) clearInterval(fadeIn);
  }, 50);
  bgmPlaying = true;
  document.getElementById('bgmDot').classList.add('playing');
}

function stopBGM() {
  if (!bgmPlaying || !bgmAudio) return;
  let v = bgmAudio.volume;
  const fadeOut = setInterval(() => {
    v = Math.max(v - 0.003, 0);
    bgmAudio.volume = v;
    if (v <= 0) { clearInterval(fadeOut); bgmAudio.pause(); }
  }, 50);
  bgmPlaying = false;
  document.getElementById('bgmDot').classList.remove('playing');
}

function toggleBGM() {
  if (bgmPlaying) stopBGM();
  else startBGM();
}

// ============================================================
// STATE
// ============================================================
function setState(s) {
  aiState = s;
  soul.className = 'soul' + (s !== 'idle' ? ' ' + s : '');
  const gc = document.querySelector('.glow-center');
  label.classList.remove('listening');
  switch (s) {
    case 'idle': label.textContent = 'tap to speak'; gc.classList.remove('on'); break;
    case 'listening': label.textContent = 'listening'; gc.classList.add('on'); label.classList.add('listening'); break;
    case 'thinking': label.textContent = ''; gc.classList.add('on'); break;
    case 'speaking': label.textContent = ''; gc.classList.add('on'); break;
    case 'waiting': label.textContent = 'your turn'; gc.classList.add('on'); break;
  }
}

// ============================================================
// RENDER — 极简：主视图只显示当前一轮（最新 user + 当前 Haru）
// ============================================================
// 当前轮：{ userIdx, haruIdx } —— 指向 messages 数组里的索引
// 历史记录仍然保留在 messages 里，通过 history overlay 查看
let currentTurn = { userIdx: null, haruIdx: null };

function buildUserBubble(msg, idx) {
  const el = document.createElement('div');
  el.className = 'd-msg d-you';
  const hasFix = msg.corrected && msg.corrected !== msg.text;
  const hasNative = msg.native_casual && msg.native_casual.length > 0;
  const hasExp = !!msg.explanation;
  const hasPractice = !!msg.practice;
  const hasCorrection = hasFix || hasNative || hasExp || hasPractice;
  el.innerHTML = `<div class="d-text">${esc(msg.text)}</div>` +
    (hasCorrection ? `
      <div class="d-actions"><button class="d-act" data-a="detail" data-i="${idx}">correction</button></div>
      <div class="d-detail" id="dt-${idx}">
        ${hasFix ? `<div class="d-correction">→ ${esc(msg.corrected)}</div>` : ''}
        ${hasNative ? `<div style="margin-top:6px;color:rgba(150,220,255,0.7);font-size:13px;font-weight:300">${msg.native_casual.map(n => '💬 ' + esc(n)).join('<br>')}</div>` : ''}
        ${hasExp ? `<div class="d-explanation">${esc(msg.explanation)}</div>` : ''}
        ${hasPractice ? `<div style="margin-top:6px;color:rgba(255,200,150,0.6);font-size:12px;font-weight:300">✏️ ${esc(msg.practice)}</div>` : ''}
      </div>` : '');
  return el;
}

function buildHaruBubble(msg, idx) {
  const el = document.createElement('div');
  el.className = 'd-msg d-haru';
  el.innerHTML = `
    <div class="d-text">${esc(msg.response)}</div>
    <div class="d-actions">
      <button class="d-act" data-a="replay" data-i="${idx}">replay</button>
      <button class="d-act" data-a="translate" data-i="${idx}">translate</button>
    </div>
    <div class="d-trans" id="tr-${idx}"></div>`;
  return el;
}

function renderTurn() {
  dlg.innerHTML = '';
  if (currentTurn.userIdx != null && messages[currentTurn.userIdx]) {
    dlg.appendChild(buildUserBubble(messages[currentTurn.userIdx], currentTurn.userIdx));
  }
  if (currentTurn.haruIdx != null && messages[currentTurn.haruIdx]) {
    dlg.appendChild(buildHaruBubble(messages[currentTurn.haruIdx], currentTurn.haruIdx));
  }
  localStorage.setItem('haruMsg2', JSON.stringify(messages));
}

// 兼容旧调用
function render() { renderTurn(); }

dlg.addEventListener('click', async (e) => {
  const btn = e.target.closest('.d-act');
  if (!btn) return;
  const a = btn.dataset.a, i = +btn.dataset.i;
  if (a === 'detail') {
    const el = document.getElementById(`dt-${i}`);
    if (el) { el.classList.toggle('open'); btn.classList.toggle('on'); }
  } else if (a === 'replay') {
    speak(messages[i].response);
  } else if (a === 'translate') {
    const el = document.getElementById(`tr-${i}`);
    if (!el) return;
    if (el.classList.contains('open')) { el.classList.remove('open'); btn.classList.remove('on'); return; }
    if (el.textContent) { el.classList.add('open'); btn.classList.add('on'); return; }
    btn.textContent = '...';
    try {
      const r = await fetch('/api/translate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: messages[i].response })
      });
      const d = await r.json();
      el.textContent = d.translation || '...';
    } catch { el.textContent = '...'; }
    el.classList.add('open'); btn.textContent = 'translate'; btn.classList.add('on');
  }
});

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============================================================
// MIC — 获取一次，保持常驻
// ============================================================
async function ensureMic() {
  if (micStream && micStream.active) return true;
  try {
    // 显式开启 echo cancellation + 噪音抑制 + 自动增益
    // 关键：echoCancellation 可以消除扬声器播放的 Haru 自己的声音回到麦克风
    // 否则 Whisper 会把 Haru 的 TTS 尾音当成用户说的话
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });
    micReady = true;
    return true;
  } catch (err) {
    console.log('mic error:', err);
    toast('无法访问麦克风');
    return false;
  }
}

// ============================================================
// SPEECH RECOGNITION
// ============================================================
let recogFatal = false;           // 致命错误后不再自动重启
let recogRestartCount = 0;        // 本次录音中的重启计数，超过阈值就停
const RECOG_MAX_RESTARTS = 6;
const RECOG_FATAL_ERRORS = new Set(['audio-capture', 'not-allowed', 'service-not-allowed']);

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return false;

  if (recognition) { try { recognition.abort(); } catch {} }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = true;
  finalTranscript = ''; lastTranscript = '';
  recogFatal = false;
  recogRestartCount = 0;

  recognition.onresult = (e) => {
    // 我们仍然累积 finalTranscript（作为 Whisper 失败时的 fallback），
    // 但不再把浏览器的不准确结果显示到屏幕最下面 —— 那会让用户看到很扯的识别
    // 真正的识别结果在用户说完后由 Whisper 返回并作为气泡显示
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      }
    }
  };
  recognition.onerror = (e) => {
    console.log('recog error:', e.error);
    if (RECOG_FATAL_ERRORS.has(e.error)) {
      recogFatal = true;
      console.warn('⚠️  Web Speech fatal error — 浏览器识别放弃，改用 Whisper。原因:', e.error);
      if (e.error === 'audio-capture') {
        toast('浏览器识别无法访问麦克风，将只用 Whisper');
      }
    }
  };
  recognition.onend = () => {
    // 只有仍在录音、不是 fatal、且没超过重启上限时才重启
    if (isRecording && !recogFatal && recogRestartCount < RECOG_MAX_RESTARTS) {
      recogRestartCount++;
      try { recognition.start(); } catch (err) { recogFatal = true; }
    }
  };
  try { recognition.start(); return true; } catch(err) { console.log('recog start fail:', err); return false; }
}

// ============================================================
// VOICE ACTIVITY DETECTION — 用音量检测判断是否在说话
// ============================================================
let vadInterval = null;
let silentSince = 0;
let audioCtx = null, analyser = null, vadSource = null;
let maxRMS = 0, speechFrames = 0; // track whether any real speech happened
// 阈值放宽：原来 0.012/0.018 在嘈杂环境下会让"一直有噪音"的 VAD 永远不认为你沉默
const SILENCE_THRESHOLD = 0.018; // 低于这个音量算安静
const SPEECH_RMS_MIN = 0.024;    // 要有这个音量才算"真的说过话"
// SPEECH_FRAMES_MIN = 1：只要有 1 帧（100ms）真实语音就承认。
// 之前是 3 帧（300ms），导致说短句"はい"、"そう"这种时 hadRealSpeech 永远 false，
// VAD 等不到自动停止条件。
const SPEECH_FRAMES_MIN = 1;
const SILENCE_DURATION = 2000;   // 静默 2 秒后自动发送

function startVAD() {
  if (!micStream) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // 断开旧的
  if (vadSource) { try { vadSource.disconnect(); } catch {} }

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  vadSource = audioCtx.createMediaStreamSource(micStream);
  vadSource.connect(analyser);

  const data = new Float32Array(analyser.fftSize);
  silentSince = 0;
  maxRMS = 0;
  speechFrames = 0;

  vadInterval = setInterval(() => {
    if (!isRecording) { stopVAD(); return; }

    analyser.getFloatTimeDomainData(data);
    // 计算 RMS 音量
    let sum = 0;
    for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
    const rms = Math.sqrt(sum / data.length);

    if (rms > maxRMS) maxRMS = rms;
    if (rms >= SPEECH_RMS_MIN) {
      // 用户"开始说话"那一刻 —— 如果当前还有上一轮 Haru 气泡残留，触发消散
      // 这样气泡停留到用户真的要回应时才飞走，不在 Haru 说完的瞬间就消失
      if (speechFrames === 0 && currentTurn.haruIdx != null && !dissolvingInProgress) {
        dissolveTurn();
      }
      speechFrames++;
    }

    if (rms > SILENCE_THRESHOLD) {
      // 有声音 → 重置
      silentSince = 0;
    } else {
      // 安静
      silentSince += 100; // 每100ms检测一次
      // 必须有内容才自动发送 —— 用 hadRealSpeech 判断（不再依赖 live.textContent 因为它现在只是动效）
      if (hadRealSpeech() && silentSince >= SILENCE_DURATION) {
        console.log('⏹  VAD silence timeout → auto stopRec');
        stopRec(false);
      }
    }
  }, 100);
}

function stopVAD() {
  if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
  if (vadSource) { try { vadSource.disconnect(); } catch {} vadSource = null; }
  silentSince = 0;
}

// 返回刚才这段录音是否包含真实的说话内容
function hadRealSpeech() {
  return maxRMS >= SPEECH_RMS_MIN && speechFrames >= SPEECH_FRAMES_MIN;
}

// ============================================================
// RECORDING
// ============================================================
// 开启一个全新的 MediaRecorder —— 每一轮录音必须 reset
// 用 Web Audio 给 micStream 套一个 3x GainNode，产物喂给 MediaRecorder
// 这是 stable 之外唯一新增的东西 —— 目的是补偿你麦克风偏低的音量
let _recAudioCtx = null;
let _recGainSource = null;
let _recGainNode = null;
let _recGainDest = null;

function buildGainedStream(src) {
  try {
    if (!_recAudioCtx) _recAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_recAudioCtx.state === 'suspended') _recAudioCtx.resume();
    if (_recGainSource) { try { _recGainSource.disconnect(); } catch {} }
    if (_recGainNode) { try { _recGainNode.disconnect(); } catch {} }
    _recGainSource = _recAudioCtx.createMediaStreamSource(src);
    _recGainNode = _recAudioCtx.createGain();
    _recGainNode.gain.value = 3.0;  // 3x
    _recGainDest = _recAudioCtx.createMediaStreamDestination();
    _recGainSource.connect(_recGainNode).connect(_recGainDest);
    return _recGainDest.stream;
  } catch (err) {
    console.warn('⚠️  gain pipeline failed, using raw micStream:', err);
    return src;
  }
}

function startMediaRecorder() {
  console.log('🎧 startMediaRecorder: prev state =', mediaRecorder?.state,
              '| micStream active =', micStream?.active,
              '| chunks before reset =', audioChunks.length);
  // 解绑旧 recorder 的 handler，防它延迟触发 ondataavailable 污染新的 audioChunks
  if (mediaRecorder) {
    try { mediaRecorder.ondataavailable = null; } catch {}
    if (mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.stop(); } catch {}
    }
    mediaRecorder = null;
  }
  audioChunks = [];

  if (!micStream || !micStream.active) {
    console.warn('⚠️  micStream not active — cannot create recorder');
    return false;
  }

  try {
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
    // 给 MediaRecorder 送 3x 增益后的 stream（VAD 仍然看原始 micStream，不受影响）
    const recStream = buildGainedStream(micStream);
    mediaRecorder = new MediaRecorder(recStream, {
      mimeType,
      audioBitsPerSecond: 32000  // 32 kbps, speech-optimized, stable 值
    });
    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    mediaRecorder.onerror = e => console.error('❌ mediaRecorder error:', e);
    mediaRecorder.start(500);
    console.log('🎧 new recorder ready: state =', mediaRecorder.state, 'mime =', mimeType, '@ 32kbps, gain=3x');
    return true;
  } catch (err) {
    console.error('❌ mediaRecorder creation failed:', err);
    mediaRecorder = null;
    return false;
  }
}

async function startRec() {
  if (isRecording) return;
  sessionEnded = false;

  ap.pause(); ap.currentTime = 0;
  speechSynthesis.cancel();

  // 解锁 audio + BGM (首次用户手势)
  if (!audioUnlocked) {
    try { await ap.play(); } catch {}
    ap.pause(); ap.currentTime = 0;
    audioUnlocked = true;
    startBGM();
  }

  if (!(await ensureMic())) return;

  startRecognition();
  startMediaRecorder();

  isRecording = true;
  isBusy = false;
  setState('listening');
  live.classList.add('on'); // 开呼吸点动效

  startVAD();
}

async function stopRec(silent, manual = false) {
  if (!isRecording) return;
  isRecording = false;
  const hadSpeech = hadRealSpeech();
  const peakRMS = maxRMS;
  stopVAD();
  console.log('🛑 stopRec called: silent=', silent, 'manual=', manual, 'hadSpeech=', hadSpeech);

  try { recognition?.abort(); } catch {}
  recognition = null;

  const browserText = (finalTranscript || '').trim();

  if (silent) {
    live.classList.remove('on');
    try { mediaRecorder?.stop(); } catch {}
    setState('idle');
    return;
  }

  // 取音频 blob — 即使 mediaRecorder 已经不在 recording 状态，
  // 只要 audioChunks 里有数据就直接用，避免丢音频
  let audioBlob = null;
  const recState = mediaRecorder?.state;
  console.log('🎤 mediaRecorder state at stop:', recState, 'chunks:', audioChunks.length);

  if (mediaRecorder && recState === 'recording') {
    try { mediaRecorder.requestData(); } catch {}
    audioBlob = await new Promise(resolve => {
      const onStop = () => {
        resolve(new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' }));
      };
      mediaRecorder.addEventListener('stop', onStop, { once: true });
      try { mediaRecorder.stop(); } catch {}
      setTimeout(() => resolve(new Blob(audioChunks, { type: 'audio/webm' })), 1500);
    });
  } else if (audioChunks.length > 0) {
    // Recorder 已经自己停了（或从未进入 recording）— 直接用已有 chunks
    console.log('🎤 recorder not recording but chunks available — using chunks directly');
    audioBlob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || 'audio/webm' });
  }

  console.log('🎤 stopRec: hadSpeech=', hadSpeech, 'peakRMS=', peakRMS.toFixed(4),
              'browser=', JSON.stringify(browserText), 'blob=', audioBlob?.size);

  // 没有任何真实说话内容 + 也不是用户手动点击 → 跳过 Whisper
  // 如果用户主动点了停止（manual=true），说明他们确实说了话，VAD 的判断可能偏保守 —— 无条件走 Whisper
  if (!manual && !hadSpeech && !browserText) {
    console.log('🔇 no real speech detected — skipping Whisper');
    live.classList.remove('on');
    setState('idle');
    return;
  }

  // 没有任何 blob 也没浏览器文本（连手动触发都救不了）
  if (!browserText && (!audioBlob || audioBlob.size < 500)) {
    live.classList.remove('on');
    setState('idle');
    return;
  }

  // 发 Whisper 精确识别
  live.classList.remove('on'); // 用户说完了，收起呼吸点
  let finalText = browserText; // fallback

  // 手动触发时：只要有 audio blob 就发 Whisper，不看 hadSpeech
  // VAD 触发时：保留原有安全检查
  const shouldCallWhisper = audioBlob && audioBlob.size > 500 && (manual || hadSpeech);
  if (shouldCallWhisper) {
    try {
      const t0 = Date.now();
      console.log('📤 [t=0ms] sending to Whisper: blob size=', audioBlob.size);
      {
        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: {
            'Content-Type': audioBlob.type || 'audio/webm',
            'X-Has-Browser-Text': browserText ? '1' : '0'
          },
          body: audioBlob
        });
        const t1 = Date.now();
        console.log(`📥 [+${t1-t0}ms] /api/transcribe status=`, res.status);
        const data = await res.json().catch(() => ({}));
        console.log('📥 /api/transcribe body=', data);
        if (res.ok) {
          const wt = (data.text || '').trim();
          console.log('✅ Whisper result:', wt, 'hallucination:', data.hallucination);
          if (data.hallucination) {
            console.log('⚠️ server-marked hallucination, raw was:', JSON.stringify(data.rawWhisper));
            // 幻觉 → 回退到浏览器识别结果（finalText 保持 browserText）
          } else if (wt) {
            // 只在浏览器也识别到内容时才做对比；否则直接相信 Whisper（它比浏览器精确）
            if (browserText && !textsLookRelated(wt, browserText)) {
              console.log('⚠️ Whisper vs browser: no overlap → hallucination; using browser');
            } else {
              finalText = wt;
            }
          }
        } else {
          console.error('❌ Whisper endpoint failed:', res.status, data);
        }
      }
    } catch (err) {
      console.error('❌ whisper network err:', err);
    }
  } else {
    console.log('⏭  skipping Whisper:',
                'hasBlob=', !!audioBlob,
                'blobSize=', audioBlob?.size,
                'hadSpeech=', hadSpeech);
  }

  live.classList.remove('on');
  if (finalText) {
    process(finalText);
  } else {
    // Whisper 被判幻觉 + 浏览器也空 → 别掉回 idle 让用户手动重点
    // 自动重新开始监听，让用户再说一次就行
    console.warn('⚠️  no usable transcript — auto-restarting listening');
    toast('没听清，再说一次');
    if (micReady && !sessionEnded) {
      isRecording = true;
      setState('listening');
      live.classList.add('on');
      finalTranscript = ''; lastTranscript = '';
      startRecognition();
      startMediaRecorder();
      startVAD();
    } else {
      setState('idle');
    }
  }
}

function blobToBase64(blob) {
  return new Promise(resolve => {
    const rd = new FileReader();
    rd.onloadend = () => resolve(rd.result?.split(',')[1] || null);
    rd.onerror = () => resolve(null);
    rd.readAsDataURL(blob);
  });
}

// 归一化：去标点空格，转小写
function normalizeText(s) {
  return (s || '').toLowerCase()
    .replace(/[。、！？\.\,!\?\s「」『』（）\(\)\[\]【】…・]/g, '');
}

// 判断两段文本是否相关（用较短那段的字符在较长那段里的覆盖率）
// 用来过滤"Whisper 返回结果和浏览器识别完全不一样"的情况
function textsLookRelated(a, b) {
  const na = normalizeText(a);
  const nb = normalizeText(b);
  if (!na || !nb) return true; // 任一为空 → 不做对比
  const [shorter, longer] = na.length <= nb.length ? [na, nb] : [nb, na];
  // 包含 → 肯定相关
  if (longer.includes(shorter)) return true;
  // 字符重叠率：较短文本里的字符有多少出现在较长文本里
  let hits = 0;
  for (const ch of shorter) {
    if (longer.includes(ch)) hits++;
  }
  const overlap = hits / shorter.length;
  return overlap >= 0.55; // 55% 以上认为相关
}

function tap() {
  if (isRecording) {
    stopRec(false, true); // 第二个参数 true = 用户手动触发
  } else {
    if (aiState === 'speaking') { ap.pause(); ap.currentTime = 0; }
    startRec();
  }
}

// 释放 mic（结束会话时）
function releaseMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  micReady = false;
}

// ============================================================
// TEXT INPUT
// ============================================================
// ============================================================
// PROCESS
// ============================================================
async function process(text) {
  isBusy = true;
  startTimer();
  const tProcessStart = Date.now();

  // 推入用户消息，并把它作为当前轮的 user
  const userMsg = { role: 'user', text };
  messages.push(userMsg);
  currentTurn = { userIdx: messages.length - 1, haruIdx: null };
  renderTurn();

  setState('thinking');
  showTyping();

  try {
    const tChatStart = Date.now();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 25000);
    const res = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, memories: getMemories() }), signal: ctrl.signal
    });
    clearTimeout(to);
    console.log(`⏱  /api/chat [+${Date.now() - tChatStart}ms] status=${res.status}`);
    if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'error');
    const data = await res.json();

    if (data.corrected) userMsg.corrected = data.corrected;
    if (data.explanation) userMsg.explanation = data.explanation;
    if (data.native_casual) userMsg.native_casual = data.native_casual;
    if (data.practice) userMsg.practice = data.practice;

    const haruMsg = { role: 'assistant', response: data.response || '' };
    messages.push(haruMsg);
    currentTurn.haruIdx = messages.length - 1;

    removeTyping();
    // 直接追加 Haru 气泡，避免重新渲染 user bubble（不让入场动画重播）
    const haruBubble = buildHaruBubble(haruMsg, currentTurn.haruIdx);
    dlg.appendChild(haruBubble);
    localStorage.setItem('haruMsg2', JSON.stringify(messages));

    if (data.response) {
      setState('speaking');
      const targetEl = haruBubble.querySelector('.d-text');
      let reveal = null;
      if (targetEl) {
        haruBubble.classList.add('typing');
        targetEl.textContent = '';
        reveal = startReveal(targetEl, data.response);
      }
      await speak(data.response, dur => reveal?.setDuration(dur));
      reveal?.complete();
      haruBubble.classList.remove('typing');
      // ⚠ 不在此处消散气泡。消散由 VAD 在用户"开始说话"那一刻触发
    }
  } catch (err) {
    removeTyping();
    toast(err.name === 'AbortError' ? '请求超时' : err.message);
    // 出错时清掉残留气泡
    dissolveTurn();
  }

  isBusy = false;

  // Haru 说完之后自动开始听（除非会话已结束）
  if (micReady && !sessionEnded) {
    // 250ms 微缓冲 —— 让 TTS 的最末段衰减，echo cancellation 兜底剩下的
    await new Promise(r => setTimeout(r, 250));

    // 先确保麦克风流还活着 —— TTS 播放期间 iOS 有时会释放它
    const micOk = await ensureMic();
    if (!micOk) {
      console.warn('⚠️  auto-listen: micStream lost, giving up');
      setState('waiting');
      return;
    }
    console.log('⏱  auto-listen starting for next turn');
    isRecording = true;
    setState('listening');
    live.classList.add('on');
    finalTranscript = ''; lastTranscript = '';
    startRecognition();
    const recOk = startMediaRecorder();
    if (!recOk) {
      console.error('❌ auto-listen: could not start recorder, will rely on browser recognition only');
    }
    startVAD();
  } else {
    setState('waiting');
  }
}

// ============================================================
// DISSOLVE —— 气泡克隆到 fly-stage，粒子化 + 飞入顶部遮罩星空
// 关键：立刻清空原 dialogue，让新一轮气泡可以无缝进场
// 触发时机：用户"开始说话"那一刻（由 VAD 捕捉），不是 speak 结束时
// ============================================================
let dissolvingInProgress = false;  // 防止同一轮触发多次

function dissolveTurn() {
  if (dissolvingInProgress) return;
  const haruEl = dlg.querySelector('.d-haru');
  const userEl = dlg.querySelector('.d-you');
  if (!haruEl && !userEl) return;
  dissolvingInProgress = true;

  // 建立（或复用）飞行场
  let stage = document.querySelector('.fly-stage');
  if (!stage) {
    stage = document.createElement('div');
    stage.className = 'fly-stage';
    document.body.appendChild(stage);
  }

  // 把原气泡克隆到 fly-stage
  // 关键：用 position:absolute（相对 fly-stage，即视口）而不是 fixed
  // fixed 会创建独立 stacking context，某些浏览器下不继承父级的 mask-image
  const cloneBubble = (src) => {
    if (!src) return null;
    const rect = src.getBoundingClientRect();
    const clone = src.cloneNode(true);
    clone.querySelectorAll('.d-act').forEach(x => x.remove());
    clone.style.position = 'absolute';
    clone.style.left = rect.left + 'px';
    clone.style.top = rect.top + 'px';
    clone.style.width = rect.width + 'px';
    clone.style.margin = '0';
    clone.style.padding = '0';
    clone.style.pointerEvents = 'none';
    stage.appendChild(clone);
    return clone;
  };

  const haruClone = cloneBubble(haruEl);
  const userClone = cloneBubble(userEl);

  // 立刻清空原 dialogue —— 下一轮可以零延迟进场
  currentTurn = { userIdx: null, haruIdx: null };
  renderTurn();

  // 撒消散粒子（从克隆位置发射，融入星空）
  if (haruClone) spawnDissolveParticles(haruClone, 'cosmic');
  if (userClone) spawnDissolveParticles(userClone, 'faint');

  // 下一帧启动 CSS 动画（确保 reflow 完成）
  requestAnimationFrame(() => {
    haruClone?.classList.add('dissolving');
    userClone?.classList.add('dissolving');
  });

  // 动画跑完后清理 DOM
  setTimeout(() => {
    haruClone?.remove();
    userClone?.remove();
    if (stage && stage.children.length === 0) stage.remove();
    dissolvingInProgress = false;
  }, IS_MOBILE ? 750 : 1600);
}

// ============================================================
// TEXT REVEAL — 打字机式逐字显示 + 开头优先 + 必要时跟读滚动
// ============================================================
function startReveal(el, fullText) {
  const chars = [...fullText];
  let i = 0;
  let handle = null;
  let intervalMs = 70;
  let done = false;

  // .dialogue 现在是 fixed + 顶部 mask，气泡沿 flex-end 向上生长即可
  // 不需要滚动操作，超出顶部的部分会被 CSS mask 渐变吞没

  const tick = () => {
    if (i >= chars.length) {
      clearInterval(handle); handle = null; done = true;
      return;
    }
    el.textContent += chars[i++];
  };

  const schedule = () => {
    if (handle) clearInterval(handle);
    handle = setInterval(tick, intervalMs);
  };

  schedule();

  return {
    setDuration(durSec) {
      if (done || !durSec || !isFinite(durSec) || chars.length === 0) return;
      const remaining = chars.length - i;
      if (remaining <= 0) return;
      intervalMs = Math.max(30, (durSec * 1000) / chars.length);
      schedule();
    },
    complete() {
      if (handle) clearInterval(handle);
      handle = null;
      done = true;
      el.textContent = fullText;
    }
  };
}

// ============================================================
// TYPING
// ============================================================
function showTyping() {
  const el = document.createElement('div');
  el.id = 'typ'; el.className = 'd-typing';
  el.innerHTML = '<div class="wave"><span></span><span></span><span></span></div>';
  dlg.appendChild(el); dlg.scrollTop = dlg.scrollHeight;
}
function removeTyping() { document.getElementById('typ')?.remove(); }

// ============================================================
// TTS — 关键修复：done() 只执行一次 + 基于时长的超时
// ============================================================
async function speak(text, onDuration) {
  if (!text) return;
  ap.pause(); ap.currentTime = 0;
  speechSynthesis.cancel();

  try {
    const tTtsStart = Date.now();
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 12000);
    const res = await fetch('/api/tts', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }), signal: ctrl.signal
    });
    clearTimeout(to);
    console.log(`⏱  /api/tts [+${Date.now() - tTtsStart}ms] status=${res.status}`);
    if (!res.ok) throw new Error();

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    return new Promise(resolve => {
      let resolved = false;
      const done = () => {
        if (resolved) return;
        resolved = true;
        ap.onended = null;
        ap.onerror = null;
        ap.ontimeupdate = null;
        ap.onloadedmetadata = null;
        URL.revokeObjectURL(url);
        resolve();
      };

      ap.onended = done;
      ap.onerror = done;

      // 音频 metadata 加载后即知时长 → 告诉打字机校正速度
      ap.onloadedmetadata = () => {
        if (onDuration && ap.duration && isFinite(ap.duration)) {
          onDuration(ap.duration);
        }
      };

      // 手机 backup: 用 timeupdate 检测是否播完
      ap.ontimeupdate = () => {
        if (ap.duration && ap.currentTime >= ap.duration - 0.1) done();
      };

      ap.src = url;
      ap.play().then(() => {
        const dur = ap.duration;
        if (dur && isFinite(dur)) {
          // 补一次，防止 onloadedmetadata 在 play 之后触发
          if (onDuration) onDuration(dur);
          setTimeout(done, (dur + 2) * 1000);
        } else {
          setTimeout(done, 15000);
        }
      }).catch(done);
    });
  } catch {
    return new Promise(resolve => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP'; u.onend = resolve; u.onerror = resolve;
      speechSynthesis.speak(u);
      setTimeout(resolve, 10000);
    });
  }
}

// ============================================================
// SESSION TIMER
// ============================================================
let sessionStart = null;
let timerInterval = null;

function startTimer() {
  if (sessionStart) return;
  sessionStart = Date.now();
  const timerEl = document.getElementById('timer');
  timerEl.classList.add('on');
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer').classList.remove('on');
  const duration = sessionStart ? Math.floor((Date.now() - sessionStart) / 1000) : 0;
  sessionStart = null;
  return duration;
}

// ============================================================
// SAVED SESSIONS (localStorage: haruSessions)
// ============================================================
function getSessions() {
  return JSON.parse(localStorage.getItem('haruSessions') || '[]');
}
function saveSessions(sessions) {
  localStorage.setItem('haruSessions', JSON.stringify(sessions));
}
function getMemories() {
  return JSON.parse(localStorage.getItem('haruMemories') || '[]');
}
function saveMemories(mems) {
  localStorage.setItem('haruMemories', JSON.stringify(mems));
}
async function extractAndSaveMemories(msgs) {
  try {
    const existing = getMemories();
    const res = await fetch('/api/extract-memories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs, existingMemories: existing })
    });
    if (res.ok) {
      const data = await res.json();
      if (data.memories && data.memories.length > 0) {
        const updated = [...existing, ...data.memories];
        // 超过500条时，压缩旧记忆
        if (updated.length > 500) {
          compressMemories(updated);
        } else {
          saveMemories(updated);
        }
      }
    }
  } catch (err) { console.log('memory extraction err:', err); }
}
async function compressMemories(mems) {
  // 保留最近200条不动，把前面的压缩成摘要
  const recent = mems.slice(-200);
  const old = mems.slice(0, -200);
  try {
    const res = await fetch('/api/compress-memories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ memories: old })
    });
    if (res.ok) {
      const data = await res.json();
      saveMemories([...data.compressed, ...recent]);
    } else {
      // 压缩失败就保留最近 500 条
      saveMemories(mems.slice(-500));
    }
  } catch {
    saveMemories(mems.slice(-500));
  }
}

function getTotalMinutes() {
  const sessions = getSessions();
  const totalSec = sessions.reduce((sum, s) => sum + (s.duration || 0), 0);
  return Math.round(totalSec / 60);
}

// ============================================================
// END SESSION
// ============================================================
let pendingDuration = 0; // 暂存时长，dialog 确认后用

function endSession() {
  if (!messages.length) return;
  sessionEnded = true;
  if (isRecording) stopRec(true);
  stopVAD();
  releaseMic();
  // 计算时长但先不清除 timer
  pendingDuration = sessionStart ? Math.floor((Date.now() - sessionStart) / 1000) : 0;
  const m = Math.floor(pendingDuration / 60);
  const s = pendingDuration % 60;
  document.getElementById('dialogSub').textContent =
    `This session: ${m}m${s}s · ${messages.length} messages. Save for review?`;
  document.getElementById('endDialog').classList.add('open');
}

async function saveAndEnd() {
  stopTimer();
  releaseMic();
  const savedMessages = [...messages];
  const sessions = getSessions();
  sessions.unshift({
    id: Date.now(),
    date: new Date().toISOString(),
    duration: pendingDuration,
    msgCount: messages.length,
    messages: savedMessages
  });
  saveSessions(sessions);
  updateTotalStats(pendingDuration);
  messages = [];
  localStorage.removeItem('haruMsg2');
  render(); setState('idle');
  document.getElementById('endDialog').classList.remove('open');
  toast('saving memories...');
  // 后台提取记忆
  await extractAndSaveMemories(savedMessages);
  toast('session saved');
}

function discardAndEnd() {
  stopTimer();
  releaseMic();
  messages = [];
  localStorage.removeItem('haruMsg2');
  render(); setState('idle');
  document.getElementById('endDialog').classList.remove('open');
}

function cancelEnd() {
  sessionEnded = false;
  document.getElementById('endDialog').classList.remove('open');
}

function updateTotalStats(addSec) {
  const total = parseInt(localStorage.getItem('haruTotalSec') || '0') + addSec;
  localStorage.setItem('haruTotalSec', String(total));
}

// ============================================================
// HISTORY
// ============================================================
function openHistory() {
  const body = document.getElementById('histBody');
  body.innerHTML = '';

  const sessions = getSessions();
  const totalMin = getTotalMinutes();
  const totalFromStorage = Math.round(parseInt(localStorage.getItem('haruTotalSec') || '0') / 60);
  const displayMin = Math.max(totalMin, totalFromStorage);

  // Stats
  body.innerHTML = `
    <div class="stats">
      <div class="stat-item">
        <div class="stat-val">${sessions.length}</div>
        <div class="stat-label">sessions</div>
      </div>
      <div class="stat-item">
        <div class="stat-val">${displayMin}</div>
        <div class="stat-label">minutes</div>
      </div>
      <div class="stat-item">
        <div class="stat-val">${sessions.reduce((s, x) => s + x.msgCount, 0)}</div>
        <div class="stat-label">messages</div>
      </div>
    </div>
  `;

  // 记忆区
  const mems = getMemories();
  if (mems.length) {
    body.innerHTML += `
      <div class="h-session" style="border-color:rgba(255,176,136,0.1);margin-bottom:16px">
        <div class="h-session-head" data-si="mem">
          <div class="h-session-info">
            <div class="h-session-date">Haru's Memories</div>
            <div class="h-session-stats">${mems.length} items</div>
          </div>
        </div>
        <div class="h-session-body" id="hsb-mem">
          ${mems.map((m, mi) => `<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.02)">
            <span style="color:rgba(255,200,170,0.7);font-size:13px;font-weight:300;flex:1">· ${esc(m)}</span>
            <button data-delmem="${mi}" style="background:none;border:none;color:rgba(255,80,80,0.3);font-size:14px;cursor:pointer;padding:2px 8px;flex-shrink:0">×</button>
          </div>`).join('')}
        </div>
      </div>
    `;
  }

  if (!sessions.length) {
    body.innerHTML += '<div style="color:rgba(255,255,255,0.2);font-size:13px;padding:30px;text-align:center">no saved sessions</div>';
  } else {
    sessions.forEach((sess, si) => {
      const d = new Date(sess.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const durMin = Math.floor((sess.duration || 0) / 60);
      const durSec = (sess.duration || 0) % 60;
      const preview = sess.messages.find(m => m.role === 'user')?.text || '...';

      const container = document.createElement('div');
      container.className = 'h-session';
      container.innerHTML = `
        <div class="h-session-head" data-si="${si}">
          <div class="h-session-info">
            <div class="h-session-date">${dateStr}</div>
            <div class="h-session-stats">${durMin}m${durSec}s · ${sess.msgCount} msgs</div>
            <div class="h-session-preview">${esc(preview)}</div>
          </div>
          <button class="h-session-del" data-del="${si}">delete</button>
        </div>
        <div class="h-session-body" id="hsb-${si}">
          ${sess.messages.map(m => {
            if (m.role === 'user') {
              return `<div class="h-msg">
                <div class="h-role">you</div>
                <div class="h-text">${esc(m.text)}</div>
                ${m.corrected && m.corrected !== m.text ? `<div style="color:rgba(255,180,150,0.8);font-size:14px;font-weight:300;margin-top:3px">→ ${esc(m.corrected)}</div>` : ''}
                ${m.native_casual && m.native_casual.length ? `<div style="color:rgba(150,220,255,0.7);font-size:13px;font-weight:300;margin-top:3px">${m.native_casual.map(n => '💬 ' + esc(n)).join('<br>')}</div>` : ''}
                ${m.explanation ? `<div style="color:rgba(255,200,170,0.6);font-size:13px;font-weight:300;margin-top:2px">${esc(m.explanation)}</div>` : ''}
                ${m.practice ? `<div style="color:rgba(255,200,150,0.5);font-size:12px;font-weight:300;margin-top:2px">✏️ ${esc(m.practice)}</div>` : ''}
              </div>`;
            } else {
              return `<div class="h-msg">
                <div class="h-role">haru</div>
                <div class="h-text">${esc(m.response || '')}</div>
              </div>`;
            }
          }).join('')}
        </div>
      `;
      body.appendChild(container);
    });
  }

  document.getElementById('histPanel').classList.add('open');
}

// 事件委托：展开/删除 session
document.getElementById('histBody').addEventListener('click', (e) => {
  // 删除单条记忆
  const memBtn = e.target.closest('[data-delmem]');
  if (memBtn) {
    e.stopPropagation();
    const mi = parseInt(memBtn.dataset.delmem);
    const mems = getMemories();
    mems.splice(mi, 1);
    saveMemories(mems);
    openHistory();
    return;
  }
  // 删除 session
  const delBtn = e.target.closest('[data-del]');
  if (delBtn) {
    e.stopPropagation();
    const si = parseInt(delBtn.dataset.del);
    const sessions = getSessions();
    if (sessions[si]) {
      // 减去时长
      const removed = sessions.splice(si, 1)[0];
      const total = Math.max(0, parseInt(localStorage.getItem('haruTotalSec') || '0') - (removed.duration || 0));
      localStorage.setItem('haruTotalSec', String(total));
      saveSessions(sessions);
      openHistory(); // 刷新
    }
    return;
  }
  // 展开/折叠
  const head = e.target.closest('.h-session-head');
  if (head) {
    const si = head.dataset.si;
    const body = document.getElementById(`hsb-${si}`);
    if (body) body.classList.toggle('open');
  }
});

function closeHistory() { document.getElementById('histPanel').classList.remove('open'); }

// ============================================================
// UTILS
// ============================================================
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); tap(); }
});

// ============================================================
// INIT
// ============================================================
// 主视图只显示当前一轮，启动时永远是 idle（tap to speak）
// 历史对话保存在 localStorage，通过 history 按钮访问
render();
setState('idle');
</script>
